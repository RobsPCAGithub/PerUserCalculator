<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Managed Contract Pricing Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: #f7f7f9;
      color: #222;
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
    }
    p {
      line-height: 1.5;
    }
    .calc-box {
      margin-top: 24px;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>Managed Contract Pricing Calculator</h1>
    <p>Proof of concept for managed contract pricing.</p>

    <div class="calc-box">

      <iframe 
        src="https://app.calconic.com/api/embed/calculator/69baa8edf2b9770031bcd47d"
        sandbox="allow-same-origin allow-forms allow-scripts allow-top-navigation allow-popups-to-escape-sandbox allow-popups"
        title="Calconic Calculator"
        name="Calconic Calculator"
        height="751"
        scrolling="no"
        style="width: 100%; border: 0; outline: none;">
      </iframe>

      <script>
      (function() {
        function inViewport(element) {
          var m = 100;
          var w = window;
          var r = element.getBoundingClientRect();
          var wB = w.innerHeight;
          var wR = w.innerWidth;
          return (
            (0 <= r.top && wB - m >= r.top) ||
            (0 >= r.top && wB <= r.bottom) ||
            (m <= r.bottom && wB >= r.bottom)
          ) && (
            (0 <= r.left && wR - m >= r.left) ||
            (0 >= r.left && wR <= r.right) ||
            (m <= r.right && wR >= r.right)
          );
        }

        var iframes = [];

        window.addEventListener("message", function(t) {
          if (t.data && "CALCONIC_UPDATE_HEIGHT" === t.data.action) {
            var l = document.querySelectorAll(
              'iframe[src="https://app.calconic.com/api/embed/calculator/' + t.data.payload.id + '"]'
            );

            for (let i in [...l]) {
              l[i].height = t.data.payload.height;

              if (!iframes.includes(l[i])) {
                iframes.push(l[i]);

                let intervalId = setInterval(function() {
                  l[i].contentWindow.postMessage({ action: 'IS_ACTIVE' }, '*');

                  if (inViewport(l[i])) {
                    clearInterval(intervalId);
                    l[i].contentWindow.postMessage({ action: 'IN_VIEWPORT' }, '*');
                  }
                }, 200);
              }
            }
          }
        });
      })();
      </script>

    </div>
  </div>

</body>
</html>
